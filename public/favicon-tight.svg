<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <filter
      id="glow-tight"
      x="-45%"
      y="-45%"
      width="190%"
      height="190%"
      color-interpolation-filters="sRGB"
    >
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="9" y="9" width="78" height="78" rx="17" fill="#050505" />

  <g filter="url(#glow-tight)">
    <rect x="23" y="22" width="14" height="49" rx="6" ry="11" fill="#ff4f46" />
    <rect x="40.5" y="18" width="15" height="56" rx="5.5" ry="8" fill="#3dfb5b" />
    <rect x="59" y="21" width="13" height="51" rx="7" ry="12" fill="#5467ff" />
  </g>
</svg>
